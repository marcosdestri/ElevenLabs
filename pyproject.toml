# Monorepo: Python agent in python-agent/; n8n export in n8n-workflow/

[tool.pytest.ini_options]
testpaths = ["python-agent/tests"]
pythonpath = ["python-agent"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = ["n8n-workflow"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
